<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🔐 Unlock the WiFi</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0d0d;
      --card: #161616;
      --card2: #1e1e1e;
      --border: #2a2a2a;
      --accent: #f5c518;     /* IMDb gold — ties into movie theme */
      --accent2: #e63946;    /* meme red for wrong */
      --green: #2dc653;
      --text: #f0f0f0;
      --muted: #777;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 24px 16px 48px;
    }

    /* ─── HERO ─── */
    .hero {
      text-align: center;
      margin-bottom: 32px;
      animation: fadeDown 0.6s ease both;
    }
    .hero-badge {
      display: inline-block;
      background: var(--accent);
      color: #000;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 99px;
      margin-bottom: 12px;
    }
    .hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 10vw, 80px);
      line-height: 1;
      letter-spacing: 2px;
      color: var(--text);
    }
    .hero h1 span { color: var(--accent); }
    .hero p {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      max-width: 320px;
      margin-inline: auto;
    }

    /* ─── PROGRESS ─── */
    .progress-wrap {
      width: 100%;
      max-width: 560px;
      margin-bottom: 20px;
      animation: fadeDown 0.6s 0.1s ease both;
    }
    .progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* ─── CARD ─── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      width: 100%;
      max-width: 560px;
      animation: fadeUp 0.4s ease both;
    }

    .q-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .q-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 1px;
    }
    .q-tag {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--card2);
      border: 1px solid var(--border);
      padding: 3px 8px;
      border-radius: 99px;
    }

    .question-text {
      font-size: clamp(16px, 4vw, 20px);
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 22px;
    }

    /* ─── OPTIONS ─── */
    .options {
      display: grid;
      gap: 10px;
    }
    .option-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      text-align: left;
      color: var(--text);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }
    .option-btn:hover:not(:disabled) {
      border-color: var(--accent);
      background: #1e1e1e;
      transform: translateX(3px);
    }
    .option-btn:disabled { cursor: default; }
    .option-btn.correct {
      border-color: var(--green);
      background: rgba(45, 198, 83, 0.08);
    }
    .option-btn.wrong {
      border-color: var(--accent2);
      background: rgba(230, 57, 70, 0.08);
    }
    .option-letter {
      width: 28px;
      height: 28px;
      min-width: 28px;
      background: var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      transition: background 0.2s, color 0.2s;
    }
    .option-btn.correct .option-letter { background: var(--green); color: #000; }
    .option-btn.wrong .option-letter { background: var(--accent2); color: #fff; }

    /* ─── FEEDBACK ─── */
    .feedback {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .feedback.show { display: flex; align-items: flex-start; gap: 8px; }
    .feedback.correct-fb { background: rgba(45,198,83,0.1); border: 1px solid rgba(45,198,83,0.3); color: #7ef5a0; }
    .feedback.wrong-fb { background: rgba(230,57,70,0.1); border: 1px solid rgba(230,57,70,0.3); color: #f88; }

    /* ─── NEXT BTN ─── */
    .next-btn {
      margin-top: 20px;
      width: 100%;
      background: var(--accent);
      color: #000;
      font-weight: 700;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      padding: 14px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.5px;
      display: none;
      transition: opacity 0.2s, transform 0.15s;
    }
    .next-btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .next-btn.show { display: block; }

    /* ─── SCORE TRACKER ─── */
    .score-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 28px;
      animation: fadeDown 0.6s 0.15s ease both;
    }
    .pip {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.3s;
    }
    .pip.hit { background: var(--green); }
    .pip.miss { background: var(--accent2); }

    /* ─── RESULT SCREENS ─── */
    #result-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 480px;
      width: 100%;
      animation: fadeUp 0.5s ease both;
    }
    .result-icon { font-size: 72px; margin-bottom: 16px; }
    .result-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(40px, 10vw, 64px);
      line-height: 1;
      margin-bottom: 8px;
    }
    .result-sub { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

    /* Password reveal */
    .password-box {
      background: var(--card);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      padding: 24px 32px;
      width: 100%;
      margin-bottom: 20px;
      position: relative;
    }
    .password-label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .password-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      letter-spacing: 4px;
      color: var(--text);
    }
    .copy-btn {
      margin-top: 12px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Fail screen */
    .retry-btn {
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text);
      font-weight: 600;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      padding: 14px 28px;
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
    }
    .retry-btn:hover { border-color: var(--accent); transform: translateY(-1px); }

    /* confetti canvas */
    #confetti-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 999;
    }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.06); }
      100% { transform: scale(1); }
    }
    .pop { animation: pop 0.3s ease; }
  </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<!-- QUIZ SECTION -->
<div id="quiz-section" style="width:100%;display:flex;flex-direction:column;align-items:center;">
  <div class="hero">
    <div class="hero-badge">🔐 WiFi Access</div>
    <h1>Know The <span>Host?</span></h1>
    <p>Answer <strong>all 5 questions</strong> correctly to unlock the WiFi password.</p>
  </div>

  <div class="score-row" id="score-row"></div>

  <div class="progress-wrap">
    <div class="progress-info">
      <span id="prog-label">Question 1 of 8</span>
      <span id="score-label">Score: 0</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="card" id="question-card">
    <div class="q-meta">
      <span class="q-num" id="q-num">Q1</span>
      <span class="q-tag" id="q-tag">Movies</span>
    </div>
    <div class="question-text" id="question-text"></div>
    <div class="options" id="options-container"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question →</button>
  </div>
</div>

<!-- RESULT SECTION -->
<div id="result-screen">
  <div class="result-icon" id="result-icon"></div>
  <div class="result-title" id="result-title"></div>
  <div class="result-sub" id="result-sub"></div>

  <div class="password-box" id="password-box" style="display:none;">
    <div class="password-label">WiFi Password</div>
    <div class="password-value" id="password-display"></div>
    <button class="copy-btn" onclick="copyPassword()">📋 Copy to clipboard</button>
  </div>

  <button class="retry-btn" onclick="restartQuiz()">🔄 Dubara try kar</button>
</div>

<script>
  // ─── CONFIG ───────────────────────────────────────────────
  const WIFI_PASSWORD = 'air20281';
  const PASS_NEEDED   = 5;

  const questions = [
    {
      tag: '🌊 Round 1',
      text: 'Paani se kisko khatra hai?',
      options: [
        'Unche pahad ke mandir ka pandit',
        'Pahad ka chota pandit',
        'Unche tile wale mandir ka chota pandit',
        'Unche parvat wale mandir ka pandit'
      ],
      correct: 2,
      wrongFeedbacks: [
        '😐 Seriously unche pahad ka pandit???? Tu rhne de bhai 💀',
        '😤 Chota Pandit???? Size shaming???? Ye kya hai',
        '🎉 Ye hui na baat.. password Durga Ashtami ke baad milega!',
        '🤔 Parvat uncha ya pandit uncha?? Depression aa gaya 😵'
      ]
    },
    {
      tag: '🎵 Round 2',
      text: 'Josh hai to hausle hai, ___ Asha hai to Bhosle hai',
      options: [
        'Kuch nhi hai bhai movie nhi dekhta mein',
        'Surr hai to Bhosle hai, Cricket hai to Bhogale hai',
        'Kapil hai to Dev hai, Kareena hai to Saif hai',
        'Chidiya hai to ghosle hai, Harsha hai to Bhogale hai'
      ],
      correct: 3,
      wrongFeedbacks: [
        '💀 Get a life brooooo. 😭',
        '😬 Harsha Bhogle wants to know your location.... 📍',
        '🤣 Saif, Saif ke side to Kareena hai! Aage badh',
        '🎊 Zor zor se bolkr mt bta sbko password!! Seedha bol deta'
      ]
    },
    {
      tag: '💀 Round 3',
      text: 'Which one suits best?',
      options: [
        'Ritu Pankaj Tiwari',
        'Ritu Gautam Sissodia',
        'Ritu Sameer Arya',
        'Ritu Martan Dhamdhere'
      ],
      correct: 3,
      wrongFeedbacks: [
        '🤢 Chi kya zabardasti ka match hai 😬',
        '😤 Sab bakwas hai ye siskya viskya 💅',
        '👑 Kaha raja bhoj kaha gangu teli 😂',
        '🏆 Dhamdhere for the win...... Always was! 👑'
      ]
    },
    {
      tag: '🏆 Round 4',
      text: '____ Anshuman ko, ___ ghat pr, roadroller bachane ke baad PWC ne kya inaam diya?',
      options: [
        'Award, Girgardhan, Hanuman Title',
        'Padmabhushan, Nashik, Employee of the month',
        'Padmashree, Girgardhan, Spot award with 500 kudos points',
        'How dare you judge Anshuman????'
      ],
      correct: 0,
      wrongFeedbacks: [
        '🦸 Khali Anshuman nhi, Award Anshuman puchne ka tha bhai! 😤',
        '😂 Employee of the month to sirf roz aane pr milta hai 🏢',
        '💸 Mere 500 points bhi le ja bhai, kya farak padta hai 😭',
        '😡 Abhi aakr theek krega tujhe Anshuman — how dare you judge his skills!! 🔥'
      ]
    },
    {
      tag: '🤝 Round 5',
      text: 'Bhaandiya Jeetu ka kya lgta hai?',
      options: [
        'Langotiya Jeetu ka mara hua yaar',
        'Goonge Jeetu ka bolta hua yaar',
        'Mare hue Jeetu ka langotiya yaar',
        'Haain Haain haaiinn huu huu huu heee hee hee'
      ],
      correct: 2,
      wrongFeedbacks: [
        '💀 Dosti ke liye yaar hi maar diya 😭🪦',
        '🥚 Jeetu goonga hai Bhaandiya nhi — abhi tujhe uble hue ande deta hu 😤',
        '😎 Ab maza ayega na bhidu!! 🔥',
        '😂 Hainn really??????? Seriously ye select kiya tune 💀'
      ]
    }
  ];

  // ─── STATE ────────────────────────────────────────────────
  let currentQ    = 0;
  let score       = 0;
  let answered    = false;
  let pipStates   = [];

  // ─── INIT ─────────────────────────────────────────────────
  function initQuiz() {
    currentQ  = 0;
    score     = 0;
    answered  = false;
    pipStates = new Array(questions.length).fill('pending');
    buildPips();
    loadQuestion();
    document.getElementById('quiz-section').style.display  = 'flex';
    document.getElementById('result-screen').style.display = 'none';
  }

  function buildPips() {
    const row = document.getElementById('score-row');
    row.innerHTML = '';
    questions.forEach((_, i) => {
      const pip = document.createElement('div');
      pip.className = 'pip';
      pip.id = `pip-${i}`;
      row.appendChild(pip);
    });
  }

  function updatePip(index, state) {
    const pip = document.getElementById(`pip-${index}`);
    pip.classList.remove('hit', 'miss');
    if (state === 'hit')  pip.classList.add('hit');
    if (state === 'miss') pip.classList.add('miss');
  }

  // ─── LOAD QUESTION ────────────────────────────────────────
  function loadQuestion() {
    answered = false;
    const q = questions[currentQ];

    document.getElementById('q-num').textContent       = `Q${currentQ + 1}`;
    document.getElementById('q-tag').textContent       = q.tag;
    document.getElementById('question-text').textContent = q.text;
    document.getElementById('prog-label').textContent  = `Question ${currentQ + 1} of ${questions.length}`;
    document.getElementById('score-label').textContent = `Score: ${score}`;
    document.getElementById('progress-fill').style.width = `${(currentQ / questions.length) * 100}%`;

    const fb = document.getElementById('feedback');
    fb.className = 'feedback';
    fb.innerHTML = '';

    const nb = document.getElementById('next-btn');
    nb.classList.remove('show');

    const letters = ['A', 'B', 'C', 'D'];
    const container = document.getElementById('options-container');
    container.innerHTML = '';

    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt}</span>`;
      btn.onclick = () => selectAnswer(i);
      container.appendChild(btn);
    });

    // Card pop animation
    const card = document.getElementById('question-card');
    card.classList.remove('pop');
    void card.offsetWidth;
    card.classList.add('pop');
  }

  // ─── ANSWER ───────────────────────────────────────────────
  function selectAnswer(selected) {
    if (answered) return;
    answered = true;

    const q    = questions[currentQ];
    const btns = document.querySelectorAll('.option-btn');
    const fb   = document.getElementById('feedback');
    const nb   = document.getElementById('next-btn');
    const isCorrect = selected === q.correct;

    btns.forEach((btn, i) => {
      btn.disabled = true;
      if (i === q.correct)  btn.classList.add('correct');
      if (i === selected && !isCorrect) btn.classList.add('wrong');
    });

    if (isCorrect) {
      score++;
      updatePip(currentQ, 'hit');
    } else {
      updatePip(currentQ, 'miss');
      fb.className = 'feedback wrong-fb show';
      fb.innerHTML = `<span>❌</span><span>${q.wrongFeedbacks[selected]}</span>`;
    }

    document.getElementById('score-label').textContent = `Score: ${score}`;
    nb.textContent = currentQ < questions.length - 1 ? 'Next Question →' : 'See Results';
    nb.classList.add('show');
  }

  // ─── NEXT ─────────────────────────────────────────────────
  function nextQuestion() {
    currentQ++;
    if (currentQ >= questions.length) {
      showResult();
    } else {
      loadQuestion();
    }
  }

  // ─── RESULT ───────────────────────────────────────────────
  function showResult() {
    document.getElementById('progress-fill').style.width = '100%';
    document.getElementById('quiz-section').style.display  = 'none';
    document.getElementById('result-screen').style.display = 'flex';

    const passed = score >= PASS_NEEDED;

    document.getElementById('result-icon').textContent  = passed ? '🏆' : '😬';
    document.getElementById('result-title').textContent = passed ? 'ACCESS GRANTED' : 'ACCESS DENIED';
    document.getElementById('result-sub').textContent   = passed
      ? `You got ${score}/${questions.length}. Sach mein group ka member hai tu! 🔥`
      : `You got ${score}/${questions.length}. Saare sahi chahiye the bhai. Dubara try kar!`;

    const pb = document.getElementById('password-box');
    if (passed) {
      pb.style.display = 'block';
      document.getElementById('password-display').textContent = WIFI_PASSWORD;
      launchConfetti();
    } else {
      pb.style.display = 'none';
    }
  }

  // ─── COPY ─────────────────────────────────────────────────
  function copyPassword() {
    navigator.clipboard.writeText(WIFI_PASSWORD).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = '✅ Copied!';
      setTimeout(() => btn.textContent = '📋 Copy to clipboard', 2000);
    });
  }

  // ─── RESTART ──────────────────────────────────────────────
  function restartQuiz() { initQuiz(); }

  // ─── CONFETTI ─────────────────────────────────────────────
  function launchConfetti() {
    const canvas = document.getElementById('confetti-canvas');
    const ctx    = canvas.getContext('2d');
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;

    const pieces = Array.from({ length: 120 }, () => ({
      x:  Math.random() * canvas.width,
      y: -20 - Math.random() * 100,
      w:  6 + Math.random() * 8,
      h:  10 + Math.random() * 6,
      r:  Math.random() * Math.PI * 2,
      dr: (Math.random() - 0.5) * 0.15,
      vx: (Math.random() - 0.5) * 2,
      vy: 2 + Math.random() * 3,
      color: ['#f5c518','#e63946','#2dc653','#4cc9f0','#f77f00','#fff'][Math.floor(Math.random()*6)]
    }));

    let frames = 0;
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pieces.forEach(p => {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.r);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.restore();
        p.x  += p.vx;
        p.y  += p.vy;
        p.r  += p.dr;
        p.vy += 0.03;
      });
      frames++;
      if (frames < 180) requestAnimationFrame(draw);
      else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    draw();
  }

  // ─── START ────────────────────────────────────────────────
  initQuiz();
</script>
</body>
</html>
